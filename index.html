<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap Indonesia | Intro</title>
    <style>
        /* Base Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* Gradasi Litosfer ke Magma */
            background: radial-gradient(circle at center, #4d2600 0%, #1a0d00 70%, #000 100%);
        }

        .intro-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        /* Judul dengan Efek Gempa (Earthquake) */
        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 15px;
            color: #ecf0f1;
            text-shadow: 0px 0px 20px rgba(231, 76, 60, 0.5);
            animation: earthquake 0.3s ease-in-out infinite alternate;
        }

        /* Class untuk menghentikan gempa setelah 2 detik */
        .stable {
            animation: none !important;
            color: #f1c40f !important; /* Warna emas/sulfur */
            text-shadow: 0px 0px 30px rgba(241, 196, 15, 0.8) !important;
            transition: all 1s ease;
        }

        p.narasi {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px 0 40px 0;
            color: #bdc3c7;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s ease forwards 2.5s; /* Muncul setelah gempa berhenti */
        }

        .btn-explore {
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: transparent;
            border: 2px solid #f1c40f;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease forwards 3s;
        }

        .btn-explore:hover {
            background: #f1c40f;
            color: #1a0d00;
            box-shadow: 0 0 20px #f1c40f;
            transform: scale(1.1);
        }

        /* ANIMASI */
        @keyframes earthquake {
            0% { transform: translate(3px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, -3px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(2px, 2px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hiasan "Partikel Debu/Batu" */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="particles"></div>

    <div class="intro-container">
        <h1 id="main-title">GEOMAP</h1>
        <p class="narasi">
            Indonesia berdiri di atas pertemuan lempeng besar dunia. 
            Setiap batuan punya cerita, setiap gunung punya sejarah. 
            Apakah kamu siap menjelajahi rahasia di bawah kaki kita?
        </p>
        <a href="home.html" class="btn-explore">MULAI EKSPLORASI</a>
    </div>

    <script>
        // Logika untuk menghentikan gempa
        const title = document.getElementById('main-title');
        
        setTimeout(() => {
            title.classList.add('stable');
            // Sedikit getaran HP (Vibrate) kalau dibuka di smartphone
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
        }, 2200); // Gempa berhenti setelah 2.2 detik
    </script>
</body>
</html>
